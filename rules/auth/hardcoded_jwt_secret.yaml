id: TS-AUTH-001
name: Hardcoded JWT Secret
description: Hardcoded secrets in jwt.sign calls can expose signing material and compromise issued tokens.
severity: high
confidence: high
cwe: CWE-798
owasp:
  - A02:2021-Cryptographic Failures
languages:
  - javascript
  - typescript
logic: any
patterns:
  - type: regex
    value: "jwt\\.sign\\([\\s\\S]{0,200}?,\\s*['\\\"][^'\\\"]{8,}['\\\"]"
    flags: is
