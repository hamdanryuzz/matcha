id: TS-AUTH-003
name: Weak Fallback Secret in Configuration
description: Falling back to weak inline secrets such as 'secret' or 'changeme' can silently expose production authentication and signing flows when environment variables are missing.
severity: high
confidence: high
cwe: CWE-798
owasp:
  - A02:2021-Cryptographic Failures
  - A07:2021-Identification and Authentication Failures
languages:
  - javascript
  - typescript
logic: any
patterns:
  - type: semantic
    value: env_fallback_secret
