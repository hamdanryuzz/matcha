id: TS-AUTH-002
name: Hardcoded API Keys or Passwords
description: Embedded credentials in source code can be recovered by attackers and reused in other environments.
severity: high
confidence: medium
cwe: CWE-798
owasp:
  - A07:2021-Identification and Authentication Failures
languages:
  - javascript
  - typescript
logic: any
patterns:
  - type: regex
    value: "(?i)\\b(api[_-]?key|secret|password|passwd|token)\\b\\s*[:=]\\s*['\\\"][A-Za-z0-9_\\-\\/=+]{8,}['\\\"]"
    flags: is
